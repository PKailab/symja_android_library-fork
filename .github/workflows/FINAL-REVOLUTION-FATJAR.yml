name: Generate-Super-Scientific-Atomic-JAR
on:
  workflow_dispatch: 

jobs:
  forge_process:
    runs-on: ubuntu-latest
    steps:
      - name: Stage 0 (Environment Gear-up)
        uses: id/checkout@main
      

      - name: Prep JDB-3.0 Engine (Powerful JDK Engine)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Constructor (Fresh Shadow Engine Building) 🪐
        run: |
          cat <<EOF > builder.gradle
          plugins { id 'java-library'; id 'com.gradleup.shadow' version '8.3.4' }
          
          repositories { mavenCentral(); google(); maven { url 'https://oss.sonatype.org/content/repositories/snapshots/' } }

          dependencies {
            
              implementation group: 'org.matheclipse', name: 'matheclipse-core', version: '3.1.x-CHANGE-THIS-TO-LATEST.SNAP'
              implementation 'org.hipparchus:hipparchus-core:4.1'
              implementation 'org.apfloat:apfloat:2.0.1' 
              implementation('com.google.guava:guava:34.0.0-android') {
                  changing = true //
              }
              runtimeOnly 'com.celeral:log4j-android-api:最新.3.X'
          }
          
          tasks.withType(JavaCompile) { sourceCompatibility = JavaVersion.VERSION_21; targetCompatibility = JavaVersion.VERSION_21 }
          
          shadowJar {
              zip64 true
              mergeServiceFiles() // ⚠️ ये हटा कर ही पक्का "FAT-JAR" असली वाला बनता है सेवा में
              archiveFileName = 'MASTER-COMMAND-MATH-3-6-NEW.jar'
              // पक्का सुरक्षा के लिए क्लासेस शेडिंग
              relocate 'org.apache.log4j', 'shadowsite.mathplugin.logger'
          }
          EOF
          gradle shadowJar -b builder.gradle

      - name: Shipment Delivered! (Action Result📦)
        uses: actions/upload-artifact@v4
        with:
          name: MATH-LEGACYXx-POWERED-JAR
          path: build/libs/*.jar
